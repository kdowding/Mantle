name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · arch · test · ui (${{ matrix.os }})
    # Both documented platforms: Windows is the primary dev platform, ubuntu
    # covers the POSIX paths (start.sh, the nohup lifecycle, default paths).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned for reproducibility — bump deliberately, not on Bun's schedule.
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Architecture rules
        run: bun run check:arch

      - name: Unit tests
        run: bun test src

      - name: Build UI
        run: bun run ui:build

      - name: Svelte check
        run: bun run check:svelte

  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
